<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1c2c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RPG Map Maker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon_192.png">
<link rel="apple-touch-icon" href="assets/icon_192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <div id="modeTabs">
      <button class="mode-tab active" data-mode="bg1">背景1</button>
      <button class="mode-tab" data-mode="bg2">背景2</button>
      <button class="mode-tab" data-mode="bg3">背景3</button>
      <button class="mode-tab" data-mode="obj">オブジェ</button>
    </div>
    <button id="menuBtn" title="メニュー">☰</button>
  </header>

  <div id="canvasWrap">
    <canvas id="mapCanvas"></canvas>
    <div id="objToolbar" class="hidden">
      <button id="objDup" title="複製">⧉</button>
      <button id="objFlip" title="左右反転">⇋</button>
      <button id="objFront" title="前面へ">▲</button>
      <button id="objBack" title="背面へ">▼</button>
      <button id="objDel" title="削除">🗑</button>
    </div>
    <div id="zoomHint" class="hidden"></div>
  </div>

  <div id="toolbar">
    <button class="tool active" data-tool="pen" title="ペン">✏️</button>
    <button class="tool" data-tool="fill" title="塗りつぶし">🪣</button>
    <button class="tool" data-tool="eraser" title="消しゴム">🧽</button>
    <button class="tool" data-tool="picker" title="スポイト">💧</button>
    <span class="sep"></span>
    <button id="undoBtn" title="元に戻す">↩</button>
    <button id="redoBtn" title="やり直す">↪</button>
    <span class="sep"></span>
    <button id="gridBtn" class="active" title="グリッド表示">#</button>
    <button id="dimBtn" title="他レイヤーを暗く">◐</button>
    <span class="spacer"></span>
    <button id="paletteToggle" title="パレット開閉">▼</button>
  </div>

  <div id="palette">
    <div id="paletteTabs"></div>
    <div id="paletteGrid"></div>
  </div>

  <div id="menuPanel" class="hidden">
    <div class="menu-inner">
      <h3>メニュー</h3>
      <button id="mExportPng">🖼 PNG画像を書き出し</button>
      <button id="mExportJson">💾 マップデータ(JSON)を書き出し</button>
      <button id="mImportJson">📂 マップデータを読み込み</button>
      <button id="mResize">📐 マップサイズ変更</button>
      <button id="mNew">🗒 新規マップ(全消去)</button>
      <button id="mHelp">❓ 使い方</button>
      <button id="mClose" class="secondary">閉じる</button>
      <p id="mapInfo"></p>
    </div>
  </div>

  <div id="helpPanel" class="hidden">
    <div class="menu-inner">
      <h3>使い方</h3>
      <ul>
        <li><b>背景1〜3</b>: タイルを塗るレイヤー。1が最背面。</li>
        <li><b>オブジェ</b>: タイルを自由な位置に置くレイヤー。タップで選択、ドラッグで移動、<b>2本指ピンチで拡大縮小</b>。</li>
        <li>背景モード: 1本指で描画、<b>2本指でパン・ズーム</b>。</li>
        <li>🪣塗りつぶし: 同じタイルの領域を一括で塗る。</li>
        <li>💧スポイト: タップした場所のタイルを選択。</li>
        <li>データは自動保存されます(この端末のブラウザ内)。</li>
      </ul>
      <button id="hClose" class="secondary">閉じる</button>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".json,application/json" class="hidden">
  <div id="loading">タイル読み込み中…</div>
</div>
<script src="app.js"></script>
</body>
</html>
